<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Atrellis | Engineered Luxury</title>
    <link rel="stylesheet" href="css/style.css?v=2">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&family=Cormorant+Garamond:ital,wght@1,700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Video Preloader -->
    <div id="site-preloader">
        <video id="preloader-video" src="assets/preloader.mp4" muted playsinline autoplay></video>
    </div>

    <div id="scroll-wrapper">
        <canvas id="video-canvas"></canvas>
        
        <div class="overlay-wrapper">
            <div id="scroll-prompt">
                <div class="scroll-orb-bg"></div>
                <div class="scroll-prompt-content">
                    <div class="mouse-icon">
                        <div class="wheel"></div>
                    </div>
                </div>
            </div>

            <div class="info-card right-card" id="design-card">
                <div class="card-line"></div>
                                                                                                                                                                                                                                 <h3>Design Solutions</h3>
                <ul>
                    <li>Bespoke 3D Visualization</li>
                    <li>Smart Space Optimization</li>
                    <li>Regulatory Compliance Planning</li>
                </ul>
            </div>

            <div class="info-card left-card" id="build-card">
                <div class="card-line"></div>
                <h3>The Atrellis Journey</h3>
                <ol class="process-list">
                    <li><span>1</span> Online Request</li>
                    <li><span>2</span> Instant Quotation</li>
                    <li><span>3</span> Free Site Visit</li>
                    <li><span>4</span> Designing Services</li>
                    <li><span>5</span> Construction</li>
                    <li><span>6</span> Handover</li>
                </ol>
            </div>

            <div id="final-cta">
                <button class="start-journey-btn" onclick="triggerJourney()">START JOURNEY</button>
            </div>

            <div class="footer-strip">
                <div class="copyright">Atrellis Pte Ltd &copy;</div>
                <div class="logo-bar">
                    <div class="logo-group left">
                        <img src="assets/trustbar_logos/bca_authority_nobg.png" alt="BCA">
                        <span>URA</span> <!-- Text placeholder as requested if image missing -->
                        <img src="assets/trustbar_logos/hdb_licensed_nobg.png" alt="HDB">
                        <img src="assets/trustbar_logos/bizsafe3_nobg.png" alt="Bizsafe3">
                    </div>
                    <div class="logo-group center">
                        <img src="assets/trustbar_logos/atrellis_brand_nobg.png" alt="Atrellis" class="brand-logo">
                    </div>
                    <div class="logo-group right">
                        <img src="assets/trustbar_logos/nippon_paint_nobg.png" alt="Nippon Paint">
                        <img src="assets/trustbar_logos/sheerweave_nobg.png" alt="Sheerweave">
                        <img src="assets/trustbar_logos/nus_logo_nobg.png" alt="NUS">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="scroll-spacer" style="height: 800vh;"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <!-- Nuclear fallback: always dismiss preloader after 15s regardless of JS state -->
    <script>
        setTimeout(function() {
            var p = document.getElementById('site-preloader');
            if (p && !p.classList.contains('hidden')) {
                p.classList.add('hidden');
                document.body.style.overflow = 'auto';
                setTimeout(function() { if (p.parentNode) p.parentNode.removeChild(p); }, 1000);
            }
        }, 15000);
    </script>
    <script src="js/script.js?v=6"></script>
</body>
</html>
